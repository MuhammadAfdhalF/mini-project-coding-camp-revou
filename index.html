<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== THEME TOGGLE ===== -->
  <button id="theme-toggle" aria-label="Toggle dark mode">🌙 Dark Mode</button>

  <!-- ===== MAIN DASHBOARD GRID ===== -->
  <div class="dashboard">

    <!-- TOP CARD: Greeting, Time, Date, Custom Name -->
    <div class="card card-top">
      <div class="greeting-section">
        <div id="greeting" class="greeting">Good Morning</div>
        <div id="clock" class="clock">00:00:00</div>
        <div id="date" class="date">Monday, January 1, 2025</div>
        <div class="name-row">
          <input
            type="text"
            id="name-input"
            placeholder="Enter your name..."
            aria-label="Your name"
            maxlength="30"
          />
          <button id="save-name-btn">Save</button>
        </div>
      </div>
    </div>

    <!-- MIDDLE ROW: Timer (left) + To-Do List (right) -->
    <div class="middle-row">

      <!-- LEFT CARD: Focus Timer -->
      <div class="card card-timer">
        <h2 class="card-title">🎯 Focus Timer</h2>
        <div id="timer-display" class="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="timer-start" class="btn-primary">▶ Start</button>
          <button id="timer-stop" class="btn-secondary">⏸ Stop</button>
          <button id="timer-reset" class="btn-secondary">↺ Reset</button>
        </div>
      </div>

      <!-- RIGHT CARD: To-Do List -->
      <div class="card card-todo">
        <h2 class="card-title">✅ To-Do List</h2>
        <div class="todo-input-row">
          <input
            type="text"
            id="task-input"
            placeholder="Add a new task..."
            aria-label="New task"
            maxlength="100"
          />
          <button id="add-task-btn" class="btn-primary">Add</button>
        </div>
        <div id="duplicate-warning" class="warning hidden">Task already exists!</div>
        <ul id="task-list" class="task-list" aria-label="Task list"></ul>
      </div>

    </div>

    <!-- BOTTOM CARD: Quick Links -->
    <div class="card card-links">
      <h2 class="card-title">🔗 Quick Links</h2>
      <div class="links-input-row">
        <input
          type="text"
          id="link-name-input"
          placeholder="Link name..."
          aria-label="Link name"
          maxlength="30"
        />
        <input
          type="url"
          id="link-url-input"
          placeholder="https://..."
          aria-label="Link URL"
          maxlength="200"
        />
        <button id="add-link-btn" class="btn-primary">Add Link</button>
      </div>
      <div id="links-container" class="links-container"></div>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
